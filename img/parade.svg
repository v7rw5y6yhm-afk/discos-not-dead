<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="day" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8c9d9"/>
      <stop offset="1" stop-color="#e8d9b8"/>
    </linearGradient>
    <radialGradient id="vig" cx=".5" cy=".5" r=".75">
      <stop offset=".55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".45"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".14" intercept="0"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- june sky down fourth avenue -->
  <rect width="800" height="600" fill="url(#day)"/>

  <!-- street canyon buildings -->
  <g fill="#6e5a48">
    <polygon points="0,0 210,60 210,600 0,600"/>
  </g>
  <g fill="#7d6a55">
    <polygon points="800,0 590,60 590,600 800,600"/>
  </g>
  <!-- window grids -->
  <g fill="#3d3226" opacity=".85">
    <rect x="30" y="90" width="22" height="30"/><rect x="70" y="100" width="22" height="30"/><rect x="110" y="110" width="22" height="30"/><rect x="150" y="120" width="22" height="30"/>
    <rect x="30" y="170" width="22" height="30"/><rect x="70" y="180" width="22" height="30"/><rect x="110" y="190" width="22" height="30"/><rect x="150" y="200" width="22" height="30"/>
    <rect x="30" y="250" width="22" height="30"/><rect x="70" y="260" width="22" height="30"/><rect x="110" y="270" width="22" height="30"/><rect x="150" y="280" width="22" height="30"/>
    <rect x="748" y="90" width="22" height="30"/><rect x="708" y="100" width="22" height="30"/><rect x="668" y="110" width="22" height="30"/><rect x="628" y="120" width="22" height="30"/>
    <rect x="748" y="170" width="22" height="30"/><rect x="708" y="180" width="22" height="30"/><rect x="668" y="190" width="22" height="30"/><rect x="628" y="200" width="22" height="30"/>
    <rect x="748" y="250" width="22" height="30"/><rect x="708" y="260" width="22" height="30"/><rect x="668" y="270" width="22" height="30"/><rect x="628" y="280" width="22" height="30"/>
  </g>
  <!-- people leaning out windows waving -->
  <g fill="#2b2233">
    <circle cx="41" cy="88" r="6"/><circle cx="81" cy="98" r="6"/><circle cx="759" cy="88" r="6"/><circle cx="719" cy="98" r="6"/>
  </g>

  <!-- championship banner across the street -->
  <line x1="190" y1="95" x2="610" y2="95" stroke="#3d3226" stroke-width="4"/>
  <rect x="235" y="100" width="330" height="72" rx="8" fill="#0a6b3c"/>
  <rect x="241" y="106" width="318" height="60" rx="6" fill="none" stroke="#ffd166" stroke-width="4"/>
  <text x="400" y="132" text-anchor="middle" font-family="Futura, Trebuchet MS, sans-serif" font-size="24" font-weight="bold" fill="#ffd166" letter-spacing="3">SUPERSONICS</text>
  <text x="400" y="158" text-anchor="middle" font-family="Futura, Trebuchet MS, sans-serif" font-size="19" font-weight="bold" fill="#fff" letter-spacing="4">1979 WORLD CHAMPIONS</text>

  <!-- confetti -->
  <g>
    <rect x="260" y="200" width="8" height="4" fill="#ff2d95" transform="rotate(30 264 202)"/>
    <rect x="330" y="180" width="8" height="4" fill="#ffd166" transform="rotate(-20 334 182)"/>
    <rect x="420" y="210" width="8" height="4" fill="#29b6a8" transform="rotate(45 424 212)"/>
    <rect x="490" y="185" width="8" height="4" fill="#e05a3a" transform="rotate(-40 494 187)"/>
    <rect x="380" y="240" width="8" height="4" fill="#0a6b3c" transform="rotate(15 384 242)"/>
    <rect x="300" y="255" width="8" height="4" fill="#ffd166" transform="rotate(-30 304 257)"/>
    <rect x="450" y="265" width="8" height="4" fill="#ff2d95" transform="rotate(60 454 267)"/>
    <rect x="530" y="235" width="8" height="4" fill="#29b6a8" transform="rotate(-15 534 237)"/>
    <rect x="240" y="290" width="8" height="4" fill="#e05a3a" transform="rotate(25 244 292)"/>
    <rect x="560" y="300" width="8" height="4" fill="#ffd166" transform="rotate(-50 564 302)"/>
    <rect x="350" y="310" width="8" height="4" fill="#ff2d95" transform="rotate(10 354 312)"/>
    <rect x="480" y="320" width="8" height="4" fill="#0a6b3c" transform="rotate(-25 484 322)"/>
  </g>

  <!-- open-top bus with players -->
  <g>
    <rect x="310" y="330" width="180" height="66" rx="10" fill="#0a6b3c"/>
    <rect x="318" y="338" width="164" height="24" fill="#ffd166" opacity=".9"/>
    <text x="400" y="356" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-size="15" font-weight="bold" fill="#0a6b3c" letter-spacing="1">SONICS</text>
    <circle cx="345" cy="404" r="13" fill="#241a17" stroke="#c9b79b" stroke-width="4"/>
    <circle cx="455" cy="404" r="13" fill="#241a17" stroke="#c9b79b" stroke-width="4"/>
    <g fill="#2b2233">
      <circle cx="340" cy="322" r="8"/><circle cx="372" cy="318" r="8"/><circle cx="404" cy="322" r="8"/><circle cx="436" cy="318" r="8"/><circle cx="464" cy="322" r="8"/>
    </g>
    <!-- one player holding the trophy -->
    <rect x="399" y="296" width="10" height="16" fill="#ffd166"/>
    <circle cx="404" cy="292" r="7" fill="#ffd166"/>
  </g>

  <!-- the crowd: a sea of heads -->
  <g fill="#2b2233">
    <circle cx="30" cy="520" r="17"/><circle cx="72" cy="508" r="15"/><circle cx="115" cy="524" r="18"/><circle cx="160" cy="506" r="15"/><circle cx="205" cy="522" r="17"/><circle cx="250" cy="508" r="15"/><circle cx="295" cy="526" r="18"/><circle cx="340" cy="510" r="15"/><circle cx="385" cy="524" r="17"/><circle cx="430" cy="506" r="16"/><circle cx="475" cy="522" r="17"/><circle cx="520" cy="508" r="15"/><circle cx="565" cy="526" r="18"/><circle cx="610" cy="510" r="15"/><circle cx="655" cy="522" r="17"/><circle cx="700" cy="506" r="15"/><circle cx="745" cy="522" r="17"/><circle cx="785" cy="508" r="14"/>
    <circle cx="50" cy="560" r="19"/><circle cx="100" cy="572" r="17"/><circle cx="150" cy="558" r="19"/><circle cx="200" cy="574" r="17"/><circle cx="252" cy="560" r="19"/><circle cx="304" cy="574" r="17"/><circle cx="356" cy="560" r="19"/><circle cx="408" cy="574" r="17"/><circle cx="460" cy="560" r="19"/><circle cx="512" cy="574" r="17"/><circle cx="564" cy="560" r="19"/><circle cx="616" cy="574" r="17"/><circle cx="668" cy="560" r="19"/><circle cx="720" cy="574" r="17"/><circle cx="770" cy="560" r="18"/>
  </g>
  <!-- waving arms -->
  <g stroke="#2b2233" stroke-width="7" stroke-linecap="round">
    <line x1="88" y1="500" x2="99" y2="478"/>
    <line x1="262" y1="500" x2="272" y2="476"/>
    <line x1="444" y1="498" x2="455" y2="474"/>
    <line x1="624" y1="502" x2="635" y2="478"/>
    <line x1="758" y1="498" x2="768" y2="476"/>
  </g>
  <!-- THE FIGURE: long coat, facing the camera, mid-crowd -->
  <g opacity=".5" filter="blur(1px)">
    <circle cx="540" cy="470" r="10" fill="#0d0a14"/>
    <path d="M527 482 L553 482 L558 545 L522 545 Z" fill="#0d0a14"/>
  </g>

  <!-- fades -->
  <rect width="800" height="600" fill="#c9925a" opacity=".14"/>
  <rect width="800" height="600" filter="url(#grain)"/>
  <rect width="800" height="600" fill="url(#vig)"/>
</svg>
