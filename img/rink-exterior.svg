<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2440"/>
      <stop offset=".7" stop-color="#3a3560"/>
      <stop offset="1" stop-color="#6b4a6a"/>
    </linearGradient>
    <linearGradient id="street" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2233"/>
      <stop offset="1" stop-color="#0f0c14"/>
    </linearGradient>
    <linearGradient id="doorlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd166" stop-opacity=".9"/>
      <stop offset="1" stop-color="#ff9a3d" stop-opacity=".25"/>
    </linearGradient>
    <radialGradient id="vig" cx=".5" cy=".5" r=".75">
      <stop offset=".55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".5"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".13" intercept="0"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- night sky -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="120" cy="80" r="1.6" fill="#fff" opacity=".8"/>
  <circle cx="210" cy="50" r="1.2" fill="#fff" opacity=".6"/>
  <circle cx="680" cy="70" r="1.5" fill="#fff" opacity=".7"/>
  <circle cx="590" cy="110" r="1" fill="#fff" opacity=".5"/>
  <circle cx="740" cy="140" r="1.2" fill="#fff" opacity=".6"/>

  <!-- rink building -->
  <rect x="60" y="220" width="680" height="220" fill="#3d2b26"/>
  <rect x="60" y="220" width="680" height="14" fill="#4e3a30"/>
  <rect x="60" y="425" width="680" height="15" fill="#241a17"/>

  <!-- marquee panel -->
  <rect x="150" y="150" width="500" height="130" rx="10" fill="#f2e6c9" stroke="#ff2d95" stroke-width="5"/>
  <rect x="150" y="150" width="500" height="130" rx="10" fill="none" stroke="#ffb3d6" stroke-width="1.5" opacity=".8"/>
  <text x="400" y="205" text-anchor="middle" font-family="Futura, Trebuchet MS, sans-serif" font-size="52" font-weight="bold" fill="#c0392b" letter-spacing="6">SOUTHGATE</text>
  <text x="400" y="252" text-anchor="middle" font-family="Futura, Trebuchet MS, sans-serif" font-size="30" font-weight="bold" fill="#2b5a8a" letter-spacing="10">ROLLER RINK</text>
  <!-- marquee bulbs -->
  <g fill="#ffd166">
    <circle cx="170" cy="165" r="4"/><circle cx="210" cy="165" r="4" opacity=".5"/><circle cx="250" cy="165" r="4"/><circle cx="290" cy="165" r="4" opacity=".5"/><circle cx="330" cy="165" r="4"/><circle cx="370" cy="165" r="4" opacity=".5"/><circle cx="410" cy="165" r="4"/><circle cx="450" cy="165" r="4" opacity=".5"/><circle cx="490" cy="165" r="4"/><circle cx="530" cy="165" r="4" opacity=".5"/><circle cx="570" cy="165" r="4"/><circle cx="610" cy="165" r="4" opacity=".5"/><circle cx="630" cy="165" r="4"/>
  </g>
  <!-- neon glow -->
  <rect x="150" y="150" width="500" height="130" rx="10" fill="none" stroke="#ff2d95" stroke-width="14" opacity=".14"/>

  <!-- EST 1938 small sign -->
  <rect x="345" y="292" width="110" height="26" rx="4" fill="#1d1420"/>
  <text x="400" y="310" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-size="15" fill="#ffd166" letter-spacing="2">EST. 1938</text>

  <!-- doorway with warm light + the figure -->
  <rect x="360" y="330" width="80" height="110" fill="url(#doorlight)"/>
  <rect x="356" y="326" width="88" height="6" fill="#241a17"/>
  <!-- long-coat figure, slightly out of focus -->
  <g opacity=".55" filter="blur(1px)">
    <ellipse cx="400" cy="372" rx="9" ry="9" fill="#14101c"/>
    <path d="M388 381 L412 381 L416 438 L384 438 Z" fill="#14101c"/>
  </g>

  <!-- windows -->
  <rect x="120" y="330" width="60" height="80" fill="#191320" stroke="#4e3a30" stroke-width="3"/>
  <rect x="620" y="330" width="60" height="80" fill="#191320" stroke="#4e3a30" stroke-width="3"/>
  <rect x="124" y="334" width="52" height="30" fill="#ffd166" opacity=".15"/>
  <rect x="624" y="334" width="52" height="30" fill="#ffd166" opacity=".15"/>

  <!-- wet street -->
  <rect x="0" y="440" width="800" height="160" fill="url(#street)"/>
  <rect x="230" y="450" width="340" height="120" fill="#ff2d95" opacity=".08"/>
  <rect x="350" y="445" width="100" height="130" fill="#ffd166" opacity=".1"/>

  <!-- 70s cars -->
  <g>
    <rect x="80" y="470" width="150" height="34" rx="12" fill="#7a4a2b"/>
    <rect x="108" y="452" width="86" height="26" rx="9" fill="#7a4a2b"/>
    <rect x="114" y="456" width="70" height="18" rx="6" fill="#2b2233"/>
    <circle cx="115" cy="506" r="14" fill="#0f0c14" stroke="#c9b79b" stroke-width="4"/>
    <circle cx="196" cy="506" r="14" fill="#0f0c14" stroke="#c9b79b" stroke-width="4"/>
  </g>
  <g>
    <rect x="560" y="472" width="160" height="34" rx="12" fill="#4a6a5a"/>
    <rect x="590" y="454" width="90" height="26" rx="9" fill="#4a6a5a"/>
    <rect x="596" y="458" width="74" height="18" rx="6" fill="#2b2233"/>
    <circle cx="596" cy="508" r="14" fill="#0f0c14" stroke="#c9b79b" stroke-width="4"/>
    <circle cx="682" cy="508" r="14" fill="#0f0c14" stroke="#c9b79b" stroke-width="4"/>
  </g>

  <!-- fades: sepia wash, grain, vignette -->
  <rect width="800" height="600" fill="#c9925a" opacity=".1"/>
  <rect width="800" height="600" filter="url(#grain)"/>
  <rect width="800" height="600" fill="url(#vig)"/>
</svg>
