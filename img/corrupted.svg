<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="floor2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5a33"/>
      <stop offset="1" stop-color="#5a3620"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".14" intercept="0"/></feComponentTransfer>
    </filter>
    <filter id="static">
      <feTurbulence type="fractalNoise" baseFrequency=".55" numOctaves="3" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".9" intercept="0"/></feComponentTransfer>
    </filter>
    <radialGradient id="vig" cx=".5" cy=".5" r=".75">
      <stop offset=".55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity=".5"/>
    </radialGradient>
  </defs>

  <!-- LEFT: the surviving half of the photograph — the organ corner -->
  <g>
    <rect width="800" height="600" fill="#1d1426"/>
    <rect x="0" y="0" width="800" height="380" fill="#241a30"/>
    <rect x="0" y="380" width="800" height="220" fill="url(#floor2)"/>
    <g stroke="#4a2c18" stroke-width="2" opacity=".7">
      <line x1="0" y1="420" x2="800" y2="420"/><line x1="0" y1="470" x2="800" y2="470"/><line x1="0" y1="530" x2="800" y2="530"/>
    </g>
    <!-- the organ -->
    <rect x="70" y="270" width="180" height="120" rx="8" fill="#3a2418"/>
    <rect x="82" y="288" width="156" height="26" fill="#f2e6c9"/>
    <g fill="#241608">
      <rect x="90" y="288" width="7" height="26"/><rect x="112" y="288" width="7" height="26"/>
      <rect x="134" y="288" width="7" height="26"/><rect x="156" y="288" width="7" height="26"/>
      <rect x="178" y="288" width="7" height="26"/><rect x="200" y="288" width="7" height="26"/>
      <rect x="222" y="288" width="7" height="26"/>
    </g>
    <rect x="82" y="328" width="156" height="10" fill="#241608"/>
    <!-- THE FIGURE — clearest sighting: long coat, one hand raised in a wave -->
    <g opacity=".8">
      <circle cx="320" cy="255" r="14" fill="#0d0a14"/>
      <path d="M302 272 L338 272 L346 392 L294 392 Z" fill="#0d0a14"/>
      <line x1="340" y1="285" x2="362" y2="245" stroke="#0d0a14" stroke-width="10" stroke-linecap="round"/>
    </g>
    <!-- mirror ball light dots -->
    <circle cx="140" cy="180" r="4" fill="#fff" opacity=".4"/>
    <circle cx="260" cy="140" r="3" fill="#fff" opacity=".3"/>
    <circle cx="80" cy="120" r="3" fill="#ff2d95" opacity=".3"/>
  </g>

  <!-- RIGHT: the photo dissolves into static -->
  <g>
    <rect x="430" y="0" width="370" height="600" fill="#050308"/>
    <rect x="430" y="0" width="370" height="600" filter="url(#static)" opacity=".8"/>
    <!-- torn boundary: jagged edge -->
    <polygon points="430,0 470,40 440,90 480,150 445,210 475,280 440,350 478,420 450,490 472,540 445,600 430,600" fill="#050308"/>
    <!-- rgb split bars -->
    <rect x="470" y="120" width="330" height="8" fill="#ff2d95" opacity=".7"/>
    <rect x="455" y="132" width="345" height="4" fill="#29e6ff" opacity=".7"/>
    <rect x="480" y="300" width="320" height="6" fill="#29e6ff" opacity=".6"/>
    <rect x="462" y="310" width="338" height="9" fill="#ff2d95" opacity=".5"/>
    <rect x="475" y="452" width="325" height="5" fill="#ffd166" opacity=".6"/>
    <!-- displaced photo slivers -->
    <rect x="500" y="180" width="90" height="22" fill="#8a5a33"/>
    <rect x="610" y="184" width="60" height="14" fill="#241a30"/>
    <rect x="520" y="380" width="120" height="18" fill="#5a3620"/>
    <!-- error text -->
    <text x="615" y="240" text-anchor="middle" font-family="Menlo, monospace" font-size="22" fill="#ff3b3b" letter-spacing="2">[[ FRAME 19 OF 79 ]]</text>
    <text x="615" y="270" text-anchor="middle" font-family="Menlo, monospace" font-size="22" fill="#ff3b3b" letter-spacing="2">[[ MISSING ]]</text>
    <text x="615" y="352" text-anchor="middle" font-family="Menlo, monospace" font-size="17" fill="#29e6ff" letter-spacing="1">who is the figure</text>
    <text x="615" y="374" text-anchor="middle" font-family="Menlo, monospace" font-size="17" fill="#29e6ff" letter-spacing="1">by the organ??</text>
    <text x="615" y="430" text-anchor="middle" font-family="Menlo, monospace" font-size="13" fill="#ffd166" opacity=".9" letter-spacing="1">RECOVERY: 0.00023%</text>
  </g>

  <!-- fades over the photo half -->
  <rect x="0" y="0" width="430" height="600" fill="#c9925a" opacity=".1"/>
  <rect x="0" y="0" width="440" height="600" filter="url(#grain)"/>
  <rect width="800" height="600" fill="url(#vig)"/>
</svg>
